<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Terminal - Guessing Exam</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; }
        .box { background: #111; padding: 30px; border: 1px solid #00ff41; width: 420px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 41, 0.2); }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #gate-content { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        
        .copy-btn { padding: 15px 5px; border: none; cursor: pointer; font-weight: bold; font-size: 0.7rem; transition: 0.2s; color: white; }
        .copy-btn:active { transform: scale(0.9); }


        .blue { background: #0044ff; }
        .red { background: #aa0000; }
        .purple { background: #660066; }
        .orange { background: #cc6600; }
        .pink { background: #cc0066; }
        .grey { background: #333333; }
        .cyan { background: #008888; }

        .error { color: #ff0000; font-size: 0.8rem; margin-bottom: 10px; display: none; }
        #strike-info { color: #888; font-size: 0.7rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box" id="terminal">
        <h2 id="header">IDENTITY VERIFICATION</h2>
        <div id="err" class="error">AUTH_FAILED: RE-ENTER CREDENTIALS</div>

        <div id="auth-zone">
            <input type="password" id="pass" placeholder="PASSWORD">
            <input type="password" id="key" placeholder="KEYWORD">
            <button class="login-btn" id="login-trigger">INITIALIZE DECRYPTION</button>
        </div>

        <div id="gate-content">
            <div style="font-size: 0.8rem; color: #00ff41; margin-bottom: 10px;">DECRYPTION SUCCESSFUL. SELECT THE DATA UNIT:</div>
            
            <div class="grid">
                <button class="copy-btn red" onclick="decoy('YRJYJJKUY7JK')">UGYJSK</button>
                <button class="copy-btn purple" onclick="decoy('S6UJHSTRJRUYYJ')">GVUKH</button>
                <button class="copy-btn orange" onclick="decoy('AEHTJJTA')">THRTHTHT</button>
                <button class="copy-btn cyan" onclick="decoy('hHHHHHHHFOLLT')">THSRT</button>
                <button class="copy-btn blue" id="real-unit">JMGRJGSZUgJ</button>
                <button class="copy-btn grey" onclick="decoy('KB,LHKN,LLSBHN')">BRTJH,KBL</button>
                <button class="copy-btn pink" onclick="decoy('BJHJKNKLJTAH')">RFGBERHGBK,</button>
                <button class="copy-btn red" onclick="decoy('TJ,HGTKJTGTG')">JHGVBETGHE</button>
                <button class="copy-btn purple" onclick="decoy('KJTGNBHJRTL.H')">JARETGVEJHBG</button>
            </div>
            
            <div id="strike-info">ATTEMPTS REMAINING: <span id="strikes">2</span></div>
        </div>
    </div>

    <script type="module">
        const correctP = import.meta.env.VITE_GATE_PASSWORD;
        const correctK = import.meta.env.VITE_GATE_KEYWORD;
        const realData = import.meta.env.VITE_SECRET_DATA;

        let strikes = 2;

        // Login Step
        document.getElementById('login-trigger').addEventListener('click', () => {
            const p = document.getElementById('pass').value;
            const k = document.getElementById('key').value;

            if (p === correctP && k === correctK) {
                document.getElementById('auth-zone').style.display = 'none';
                document.getElementById('gate-content').style.display = 'block';
                document.getElementById('err').style.display = 'none';
                document.getElementById('header').innerText = "DATA SELECTOR";
            } else {
                document.getElementById('err').style.display = 'block';
                document.getElementById('pass').value = '';
                document.getElementById('key').value = '';
            }
        });

       
        document.getElementById('real-unit').addEventListener('click', () => {
            navigator.clipboard.writeText(realData).then(() => {
                alert("SYSTEM: ITEM SELECTED");
            });
        });

       
        window.decoy = function(fakeMsg) {
            strikes--;
            document.getElementById('strikes').innerText = strikes;
            
          
            navigator.clipboard.writeText(fakeMsg);
            
            if (strikes <= 0) {
                document.getElementById('terminal').innerHTML = "<h1 style='color:red'>EXAM FAILED.<br>SYSTEM TERMINATED.</h1>";
            } else {
                alert("SYSTEM: ITEM SELECTED");
            }
        }
    </script>
</body>
</html>
