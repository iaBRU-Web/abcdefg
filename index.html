<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Terminal - Decoy Protocol</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { background: #141414; padding: 30px; border: 1px solid #00ff41; width: 400px; text-align: center; position: relative; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00ff41; color: #00ff41; outline: none; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; }
        
        #secret-output { display: none; margin-top: 20px; padding: 15px; border-top: 1px dashed #00ff41; }
        
        /* Prevent selection of the secret text */
        #display-text { 
            user-select: none; 
            -webkit-user-select: none; 
            filter: blur(4px); /* Adds extra "unreadable" effect until copied */
            display: block;
            margin-bottom: 15px;
            font-size: 0.8em;
            color: #444;
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .copy-btn { padding: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 10px; color: white; transition: transform 0.2s; }
        .copy-btn:hover { transform: scale(1.1); }
        
        /* Button Colors */
        .blue { background: #0000ff; grid-column: span 2; } /* The Real One */
        .red { background: #ff0000; }
        .purple { background: #800080; }
        .orange { background: #ffa500; }
        .pink { background: #ffc0cb; color: #000; }
        
        .error { color: #ff0000; display: none; margin-bottom: 10px; font-size: 0.8em; }
        #status { font-size: 0.7em; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="box" id="terminal">
        <h2 id="title">TERMINAL AUTH</h2>
        <div id="err" class="error">ACCESS DENIED</div>
        
        <div id="login-fields">
            <input type="password" id="pass" placeholder="PASSWORD">
            <input type="password" id="key" placeholder="KEYWORD">
            <button class="main-btn" id="auth-btn">DECRYPT SYSTEM</button>
        </div>

        <div id="secret-output">
            <span id="display-text">ENCRYPTED_STRING_LOCKED</span>
            <div id="status">CLICK THE BLUE UNIT TO COPY. 2 ERRORS ALLOWED.</div>
            
            <div class="grid">
                <button class="copy-btn red" onclick="wrong()">COPY</button>
                <button class="copy-btn purple" onclick="wrong()">COPY</button>
                <button class="copy-btn orange" onclick="wrong()">COPY</button>
                <button class="copy-btn pink" onclick="wrong()">COPY</button>
                
                <button class="copy-btn blue" id="real-copy-btn">COPY (REAL)</button>
                
                <button class="copy-btn red" onclick="wrong()">COPY</button>
                <button class="copy-btn purple" onclick="wrong()">COPY</button>
                <button class="copy-btn orange" onclick="wrong()">COPY</button>
                <button class="copy-btn pink" onclick="wrong()">COPY</button>
            </div>
        </div>
    </div>

    <script type="module">
        const targetPass = import.meta.env.VITE_GATE_PASSWORD;
        const targetKey = import.meta.env.VITE_GATE_KEYWORD;
        const secretText = import.meta.env.VITE_SECRET_DATA;

        let failCount = 0;

        // Login Logic
        document.getElementById('auth-btn').addEventListener('click', () => {
            const p = document.getElementById('pass').value;
            const k = document.getElementById('key').value;

            if (p === targetPass && k === targetKey) {
                document.getElementById('login-fields').style.display = 'none';
                document.getElementById('secret-output').style.display = 'block';
                document.getElementById('err').style.display = 'none';
            } else {
                document.getElementById('err').style.display = 'block';
            }
        });

        // Real Copy Logic
        document.getElementById('real-copy-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(secretText).then(() => {
                alert("DECRYPTED DATA COPIED TO CLIPBOARD");
            });
        });

        // Wrong Button Logic
        window.wrong = function() {
            failCount++;
            if (failCount >= 2) {
                document.getElementById('terminal').innerHTML = "<h1 style='color:red'>SYSTEM PURGED. REFRESH TO RETRY.</h1>";
            } else {
                alert("WARNING: INCORRECT UNIT. SYSTEM STABILITY AT 50%");
                navigator.clipboard.writeText("WRONG_DATA_ERROR_0x99");
            }
        }
    </script>
</body>
</html>
